<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Transcriptor de Clases{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/transcripciones" class="text-lg font-semibold text-indigo-700 hover:text-indigo-900">
        📚 Transcriptor de Clases
      </a>
      <div class="flex gap-3">
        <a href="/transcripciones"
           class="text-sm text-gray-600 hover:text-indigo-700 font-medium px-3 py-1 rounded hover:bg-indigo-50 transition">
          Historial
        </a>
        <a href="/subir"
           class="text-sm bg-indigo-600 text-white px-4 py-1.5 rounded hover:bg-indigo-700 transition font-medium">
          + Subir clase
        </a>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-100">
    Transcriptor de Clases &mdash; Uso personal
  </footer>

</body>
</html>
