{% extends "base.html" %}
{% block title %}Subir Clase — Transcriptor{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Transcribir una clase</h1>

  {% if errors %}
  <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded text-sm text-red-700">
    <ul class="list-disc list-inside space-y-1">
      {% for e in errors %}<li>{{ e }}</li>{% endfor %}
    </ul>
  </div>
  {% endif %}

  <form action="/subir" method="post" enctype="multipart/form-data" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="discipline">
        Disciplina <span class="text-red-500">*</span>
      </label>
      <input
        id="discipline" name="discipline" type="text" required
        value="{{ form.discipline|default('') }}"
        placeholder="ej: Física, Matemáticas, Historia"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="subject">
        Tema <span class="text-red-500">*</span>
      </label>
      <input
        id="subject" name="subject" type="text" required
        value="{{ form.subject|default('') }}"
        placeholder="ej: Cinemática — Clase 3"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="audio_file">
        Archivo de audio <span class="text-red-500">*</span>
      </label>
      <input
        id="audio_file" name="audio_file" type="file" required
        accept=".mp3,.m4a,.wav,.ogg,.mp4,.aiff,.flac"
        class="w-full text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer"
      />
      <p class="text-xs text-gray-400 mt-1">Formatos: mp3, m4a, wav, ogg, mp4, flac &nbsp;·&nbsp; Máx. 500 MB</p>
    </div>

    <div class="pt-2">
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition text-sm relative">
        <span class="normal-state">Transcribir</span>
      </button>
    </div>

  </form>
</div>
{% endblock %}
